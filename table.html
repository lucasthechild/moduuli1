<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table Example</title>
</head>
<body>
        <nav>
            <a href="index.html">Here is the Home page</a> <a href="2ndpage.html">Check out this butterfly!</a>
        </nav>
    <SECTION ID="Grades">
    <h2>Favorite Things</h2>
    <table border="1">
        <tr>
            <th>Thing</th>
            <th>Why</th>
            <th>Grade</th>
        </tr>
        <tr>
            <td>Pizza</td>
            <td>It's tasty</td>
            <td>S</td>
        </tr>
        <tr>
            <td>Video games</td>
            <td>They are fun</td>
            <td>S</td>
        </tr>
        <tr>
            <td>Sleep</td>
            <td>It's relaxing</td>
            <td>S+</td>
        </tr>
    </table>
</SECTION>
<section id="Form">
    <h2>Want to know more? Contact me!</h2>
    <form action="/submit_form" method="post">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name"><br><br>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email"><br><br>
        <label for="message">Message:</label><br>
        <textarea id="message" name="message"></textarea><br><br>
        <!-- This button does not subit, it only redirects -->
        <a href="submitted.html"><button type="button">Submit</button></a>
    </form>
</section>
</body>
</html>
